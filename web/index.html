<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Workout Analyzer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Open Graph -->
  <meta property="og:title" content="Workout Analyzer">
  <meta property="og:description" content="Track workouts, analyze strength progression, and compare strength standards.">
  <meta property="og:image" href="icons/Icon-512.png">

  <!-- Preload -->
  <link rel="preload" href="main.dart.wasm" as="fetch" type="application/wasm" crossorigin="anonymous" />
  <link rel="modulepreload" href="main.dart.mjs" />


  <title>Workout Analyzer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #seo-content { display: none; }
  </style>
</head>
<body>
  <div id="seo-content">
    <h1>Workout Analyzer</h1>
    <p>
      Cross-platform workout tracking app built with Flutter.
      Track workout history, analyze 1RM progression, and compare strength standards.
    </p>
  </div>

  <noscript>
    Workout Analyzer - A cross-platform workout tracking app built with Flutter.
  </noscript>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
